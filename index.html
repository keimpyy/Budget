<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Budget"/>
  <meta name="theme-color" content="#0a0a0f"/>

  <link rel="apple-touch-icon" sizes="180x180" href="budget-icon-180.png"/>
  <link rel="icon" href="budget-icon-180.png" type="image/png"/>

  <title>Budget</title>

  <link rel="stylesheet" href="styles/app.css?v=20260412a"/>
</head>
<body data-theme="kuro">
  <div id="sakura-layer"></div>

  <div
    class="shell"
    id="app-shell"
    ontouchstart="appSwipeStart(event)"
    ontouchmove="appSwipeMove(event)"
    ontouchend="appSwipeEnd(event)"
  >
    <div class="header">
      <div class="header-top">
        <button class="badge-btn" onclick="openSettings()">Sync</button>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="go('dashboard',this)">Dashboard</button>
        <button class="tab" onclick="go('budget',this)">Budget</button>
        <button class="tab" onclick="go('leningen',this)">Leningen</button>
        <button class="tab" id="settings-tab-btn" onclick="go('instellingen',this)" style="display:none">Instellingen</button>
      </div>
    </div>

    <div class="content">
      <div class="view active" id="v-dashboard"></div>
      <div class="view" id="v-budget"></div>
      <div class="view" id="v-leningen"></div>
      <div class="view" id="v-instellingen"></div>
    </div>
  </div>

  <div id="budget-modal-root"></div>
  <div id="app-modal-root"></div>

  <div id="startup-overlay">
    <div class="loader-wrap">
      <div class="startup-kicker">Budget</div>
      <div class="startup-title">Gegevens laden</div>
      <div class="startup-copy" id="startup-status-text">App starten...</div>
      <div class="startup-progress" aria-hidden="true">
        <div class="startup-progress-fill" id="startup-progress-fill" style="width:8%"></div>
      </div>
      <div class="startup-progress-meta">
        <span>Synchroniseren met Supabase</span>
        <span id="startup-progress-value">8%</span>
      </div>
    </div>
  </div>

  <canvas id="confetti-layer"></canvas>

  <script src="vendor/supabase-js.js?v=20260409b"></script>
  <script src="js/state.js?v=20260412a"></script>
  <script src="js/storage.js?v=20260412a"></script>
  <script src="js/supabase.js?v=20260412a"></script>
  <script src="js/ui.js?v=20260412a"></script>
  <script src="js/dashboard.js?v=20260412a"></script>
  <script src="js/budget.js?v=20260412a"></script>
  <script src="js/loans.js?v=20260412a"></script>
  <script src="js/settings.js?v=20260412a"></script>
  <script src="js/app.js?v=20260412a"></script>
</body>
</html>
