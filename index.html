<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#0a0a0f">
<title>Budget · Veenstra</title>
<style>
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#242432;
  --border:rgba(255,255,255,0.07);--text:#f0f0f8;--muted:#6b6b88;
  --accent:#7c6af7;--accent2:#4ecdc4;--green:#3ddc84;--red:#ff6b6b;--amber:#ffbe0b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
.shell{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:calc(env(safe-area-inset-top,0px) + 20px) 20px 0;position:sticky;top:0;background:var(--bg);z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.title{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.title span{color:var(--accent)}
.badge{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-family:monospace}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;font-size:13px;font-weight:600;padding:7px 16px;border-radius:20px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--muted);transition:all .15s;font-family:inherit}
.tab.active{background:var(--surface2);border-color:var(--border);color:var(--text)}
.content{flex:1;padding:10px 20px calc(env(safe-area-inset-bottom,0px) + 40px)}
.view{display:none}.view.active{display:block}
.hero{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border:1px solid rgba(124,106,247,.25);border-radius:20px;padding:24px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(124,106,247,.15) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:11px;color:var(--muted);letter-spacing:1px;font-family:monospace;margin-bottom:6px}
.hero-amount{font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1}
.hero-amount.pos{color:var(--green)}.hero-amount.neg{color:var(--red)}
.hero-sub{display:flex;gap:20px;margin-top:16px}
.hero-sub-label{font-size:10px;color:var(--muted);font-family:monospace;margin-bottom:3px}
.hero-sub-val{font-size:15px;font-weight:600}
.sq-bar{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 18px;margin-bottom:16px}
.sq-top{display:flex;justify-content:space-between;margin-bottom:10px}
.sq-label{font-size:13px;font-weight:600;color:var(--muted)}
.sq-val{font-family:monospace;font-size:16px;font-weight:500;color:var(--accent2)}
.track{background:var(--surface3);border-radius:99px;height:8px;overflow:hidden}
.fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease}
.sq-note{text-align:right;margin-top:5px;font-size:10px;color:var(--muted);font-family:monospace}
.sec{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 10px}
.cat-card,.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:8px}
.cat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cat-name{font-size:15px;font-weight:700}
.cat-b{font-family:monospace;font-size:14px;font-weight:500;color:var(--accent)}
.prog{background:var(--surface3);border-radius:99px;height:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--accent)}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.input{font-size:16px!important;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;padding:10px 14px;width:100%;outline:none}
.input.small{width:110px;text-align:right;font-family:monospace}
.btn{background:linear-gradient(135deg,var(--accent),#9b8af7);border:none;border-radius:14px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;padding:14px 16px;cursor:pointer}
.btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid rgba(124,106,247,.35)}
.btn.danger{background:rgba(255,107,107,.14);color:var(--red);border:1px solid rgba(255,107,107,.25)}
.btn.sm{padding:8px 10px;border-radius:10px;font-size:12px}
.stack{display:flex;flex-direction:column;gap:8px}
.inline{display:flex;gap:8px;align-items:center}
.muted{color:var(--muted)}
.mono{font-family:monospace}
.post-row{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:8px}
.loan-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.loan-row:last-child{border-bottom:none}
.note{font-size:12px;color:var(--muted);line-height:1.6}
#startup-overlay{position:fixed;inset:0;background:rgba(10,10,15,.96);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#startup-overlay .spinner{width:42px;height:42px;border:4px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-top">
      <div class="title">Budget <span>·</span> Veenstra</div>
      <div class="badge" id="sync-badge">Verbinden...</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="go('dashboard',this)">Dashboard</button>
      <button class="tab" onclick="go('budget',this)">Budget</button>
      <button class="tab" onclick="go('leningen',this)">Leningen</button>
      <button class="tab" onclick="go('instellingen',this)">Instellingen</button>
    </div>
  </div>
  <div class="content">
    <div id="v-dashboard" class="view active"></div>
    <div id="v-budget" class="view"></div>
    <div id="v-leningen" class="view"></div>
    <div id="v-instellingen" class="view"></div>
  </div>
</div>

<div id="startup-overlay">
  <div class="spinner"></div>
  <div class="muted">Budget laden...</div>
</div>

<script>
const DEFAULT_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxa-f-tmhNbPXRDgMc9VSU7nAxKtoV8hCd2twIim1Ikq58uExIrXWgnyEF0DwbMJPpmVA/exec';

const state = {
  sheetsUrl: DEFAULT_SHEETS_URL,
  inkomsten: [
    { naam:'KT', bedrag:2950 },
    { naam:'Ryanne', bedrag:1581.89 },
  ],
  categorieen: [],
  budget: [],
  leningen: [
    { id:'l1', naam:'Auto 1', totaal:2700, betaald:750, kleur:'#7c6af7' },
    { id:'l2', naam:'Auto 2', totaal:7500, betaald:0, kleur:'#4ecdc4' },
  ],
  openCats:{},
};

function uid(prefix){ return `${prefix}_${Date.now()}_${Math.floor(Math.random()*100000)}`; }
function fmt(n){ const v = Number(n || 0); return '€ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function fmtShort(n){ return '€' + Math.round(Number(n || 0)).toLocaleString('nl'); }
function inkomstenTotaal(){ return state.inkomsten.reduce((s,r)=>s + Number(r.bedrag || 0), 0); }
function budgetTotaal(){ return state.budget.reduce((s,r)=>s + Number(r.budget || 0), 0); }
function overschot(){ return inkomstenTotaal() - budgetTotaal(); }
function spaarquote(){ const inc = inkomstenTotaal(); return inc ? (overschot() / inc) * 100 : 0; }
function orderedCats(){ return [...state.categorieen].sort((a,b)=>(a.volgorde||0)-(b.volgorde||0)); }
function itemsForCategory(catId){ return state.budget.filter(r=>String(r.categorieId) === String(catId)).sort((a,b)=>(a.volgorde||0)-(b.volgorde||0)); }
function totalForCategory(catId){ return itemsForCategory(catId).reduce((s,r)=>s + Number(r.budget || 0), 0); }

function persistLocal(){
  const cache = {
    inkomsten: state.inkomsten,
    categorieen: state.categorieen,
    budget: state.budget,
    leningen: state.leningen
  };
  localStorage.setItem('bv_budget_state_v3', JSON.stringify(cache));
}
function restoreLocal(){
  try{
    const raw = localStorage.getItem('bv_budget_state_v3');
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(parsed.inkomsten) state.inkomsten = parsed.inkomsten;
    if(parsed.categorieen) state.categorieen = parsed.categorieen;
    if(parsed.budget) state.budget = parsed.budget;
    if(parsed.leningen) state.leningen = parsed.leningen;
  }catch(e){}
}
function updateSyncBadge(text){
  const el = document.getElementById('sync-badge');
  if(el) el.textContent = text;
}
async function safeJson(res){
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e){ return { ok:false, error:'Parse fout', raw:text.slice(0,200) }; }
}
async function sheetsGet(){
  const res = await fetch(state.sheetsUrl + '?action=getAll', { redirect:'follow' });
  return safeJson(res);
}
async function sheetsPost(data){
  const res = await fetch(state.sheetsUrl, { method:'POST', redirect:'follow', body: JSON.stringify(data) });
  return safeJson(res);
}
function normalizeData(){
  state.categorieen = orderedCats().map((cat, idx)=>({
    id: String(cat.id || uid('cat')),
    naam: String(cat.naam || 'Nieuwe categorie'),
    volgorde: idx + 1
  }));
  state.budget = state.budget.map(row=>({
    id: String(row.id || uid('bud')),
    categorieId: String(row.categorieId || ''),
    post: String(row.post || 'Nieuwe post'),
    budget: Number(row.budget || 0),
    volgorde: Number(row.volgorde || 0)
  }));
  const validCatIds = new Set(state.categorieen.map(c=>c.id));
  state.budget = state.budget.filter(r=>validCatIds.has(r.categorieId));
  for (const cat of state.categorieen){
    const rows = itemsForCategory(cat.id);
    rows.forEach((row, idx)=>{ row.volgorde = idx + 1; });
  }
}
function toRows(){
  normalizeData();
  return {
    action:'saveAll',
    inkomsten: state.inkomsten.map(r=>({
      naam: r.naam || '',
      bedrag: Number(r.bedrag || 0)
    })),
    categorieen: orderedCats().map((c,i)=>({
      id: c.id,
      naam: c.naam || '',
      volgorde: i + 1
    })),
    budget: orderedCats().flatMap(c =>
      itemsForCategory(c.id).map((r, rowIndex)=>({
        id: r.id,
        categorieId: c.id,
        post: r.post || '',
        budget: Number(r.budget || 0),
        volgorde: rowIndex + 1
      }))
    ),
    leningen: state.leningen.map(r=>({
      id: r.id,
      naam: r.naam || '',
      totaal: Number(r.totaal || 0),
      betaald: Number(r.betaald || 0),
      kleur: r.kleur || '#7c6af7'
    }))
  };
}
function applySheets(data){
  if(data.inkomsten) state.inkomsten = data.inkomsten.map(r=>({ naam: String(r.naam || ''), bedrag: Number(r.bedrag || 0) }));
  if(data.categorieen) state.categorieen = data.categorieen.map((r,i)=>({ id: String(r.id || uid('cat')), naam: String(r.naam || ''), volgorde: Number(r.volgorde || (i+1)) }));
  if(data.budget) state.budget = data.budget.map((r,i)=>({ id: String(r.id || uid('bud')), categorieId: String(r.categorieId || ''), post: String(r.post || ''), budget: Number(r.budget || 0), volgorde: Number(r.volgorde || (i+1)) }));
  if(data.leningen) state.leningen = data.leningen.map(r=>({ id: String(r.id || uid('ln')), naam: String(r.naam || ''), totaal: Number(r.totaal || 0), betaald: Number(r.betaald || 0), kleur: String(r.kleur || '#7c6af7') }));
  normalizeData();
  persistLocal();
  rerenderAll();
}
function rerenderAll(){
  renderDashboard();
  renderBudget();
  renderLeningen();
  renderInstellingen();
}
function showToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:11px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(124,106,247,.4);font-family:inherit';
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2200);
}
function go(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('v-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='dashboard') renderDashboard();
  if(name==='budget') renderBudget();
  if(name==='leningen') renderLeningen();
  if(name==='instellingen') renderInstellingen();
}
function renderDashboard(){
  const o = overschot(), s = spaarquote(), total = budgetTotaal();
  document.getElementById('v-dashboard').innerHTML = `
    <div class="hero">
      <div class="hero-label">MAANDELIJKS OVERSCHOT</div>
      <div class="hero-amount ${o>=0?'pos':'neg'}">${fmtShort(o)}</div>
      <div class="hero-sub">
        <div><div class="hero-sub-label">INKOMSTEN</div><div class="hero-sub-val" style="color:var(--green)">${fmtShort(inkomstenTotaal())}</div></div>
        <div><div class="hero-sub-label">BUDGET</div><div class="hero-sub-val" style="color:var(--accent)">${fmtShort(total)}</div></div>
      </div>
    </div>
    <div class="sq-bar">
      <div class="sq-top"><span class="sq-label">Spaarquote</span><span class="sq-val">${s.toFixed(1)}%</span></div>
      <div class="track"><div class="fill" style="width:${Math.min(100, Math.max(0, s))}%"></div></div>
      <div class="sq-note">Op basis van budget</div>
    </div>
    <div class="sec">Categorieën</div>
    ${orderedCats().map(cat => `
      <div class="cat-card">
        <div class="cat-top">
          <div class="cat-name">${escapeHtml(cat.naam)}</div>
          <div class="cat-b">${fmt(totalForCategory(cat.id))}</div>
        </div>
        <div class="prog"><div class="prog-fill" style="width:${total ? (totalForCategory(cat.id)/total)*100 : 0}%"></div></div>
      </div>
    `).join('')}
  `;
}
function renderBudget(){
  document.getElementById('v-budget').innerHTML = `
    <div class="card">
      <div class="sec" style="margin-top:0">Inkomsten</div>
      <div class="stack">
        ${state.inkomsten.map((r, idx)=>`
          <div class="row">
            <input class="input" value="${escapeHtml(r.naam)}" onchange="updateIncomeName(${idx}, this.value)">
            <input class="input small" type="number" value="${Number(r.bedrag||0)}" onchange="updateIncomeAmount(${idx}, this.value)">
          </div>
        `).join('')}
      </div>
    </div>

    <div class="row" style="margin:14px 0">
      <div class="sec" style="margin:0">Categorieën</div>
      <button class="btn sm" onclick="addCategory()">+ Categorie</button>
    </div>

    ${orderedCats().map(cat => {
      const isOpen = !!state.openCats[cat.id];
      return `
        <div class="card">
          <div class="row">
            <div class="inline" style="flex:1">
              <input class="input" style="font-weight:700" value="${escapeHtml(cat.naam)}" onchange="renameCategory('${cat.id}', this.value)">
              <span class="mono" style="min-width:88px;text-align:right">${fmt(totalForCategory(cat.id))}</span>
            </div>
            <div class="inline">
              <button class="btn sm ghost" onclick="toggleCategory('${cat.id}')">${isOpen ? 'Sluit' : 'Open'}</button>
              <button class="btn sm danger" onclick="removeCategory('${cat.id}')">Verwijder</button>
            </div>
          </div>
          ${isOpen ? `
            <div class="stack" style="margin-top:10px">
              ${itemsForCategory(cat.id).map(item => `
                <div class="post-row">
                  <input class="input" value="${escapeHtml(item.post)}" onchange="renameBudgetPost('${item.id}', this.value)">
                  <input class="input small" type="number" value="${Number(item.budget||0)}" onchange="updateBudgetAmount('${item.id}', this.value)">
                  <button class="btn sm danger" onclick="removeBudgetPost('${item.id}')">✕</button>
                </div>
              `).join('')}
              <button class="btn secondary" onclick="addBudgetPost('${cat.id}')">+ Post toevoegen</button>
            </div>
          ` : ''}
        </div>
      `;
    }).join('')}

    <div class="card">
      <div class="row">
        <div style="font-weight:700">Totaal budget</div>
        <div class="mono" style="color:var(--accent)">${fmt(budgetTotaal())}</div>
      </div>
      <div class="row" style="margin-top:8px">
        <div class="muted">Overschot</div>
        <div class="mono" style="color:${overschot()>=0?'var(--green)':'var(--red)'}">${fmt(overschot())}</div>
      </div>
      <div class="stack" style="margin-top:14px">
        <button class="btn" onclick="saveToSheets()">☁️ Opslaan in Sheets</button>
        <button class="btn secondary" onclick="loadFromSheets()">↻ Opnieuw ophalen</button>
      </div>
      <div id="save-status" class="note" style="margin-top:10px"></div>
    </div>
  `;
}
function renderLeningen(){
  document.getElementById('v-leningen').innerHTML = `
    <div class="card">
      <div class="sec" style="margin-top:0">Leningen</div>
      ${state.leningen.map((l, idx)=>{
        const restant = Number(l.totaal||0) - Number(l.betaald||0);
        const pct = Number(l.totaal||0) ? Math.min(100, (Number(l.betaald||0)/Number(l.totaal||0))*100) : 0;
        return `
          <div class="loan-row">
            <div style="flex:1">
              <input class="input" value="${escapeHtml(l.naam)}" onchange="updateLoanName(${idx}, this.value)">
              <div class="track" style="margin-top:8px"><div class="fill" style="width:${pct}%;background:${l.kleur||'#7c6af7'}"></div></div>
              <div class="note" style="margin-top:6px">Restant: ${fmt(restant)}</div>
            </div>
            <div class="stack" style="width:110px">
              <input class="input small" type="number" value="${Number(l.totaal||0)}" onchange="updateLoanTotal(${idx}, this.value)">
              <input class="input small" type="number" value="${Number(l.betaald||0)}" onchange="updateLoanPaid(${idx}, this.value)">
            </div>
          </div>
        `;
      }).join('')}
      <div class="stack" style="margin-top:12px">
        <button class="btn secondary" onclick="addLoan()">+ Lening</button>
        <button class="btn" onclick="saveToSheets()">☁️ Opslaan in Sheets</button>
      </div>
    </div>
  `;
}
function renderInstellingen(){
  document.getElementById('v-instellingen').innerHTML = `
    <div class="card">
      <div class="sec" style="margin-top:0">Synchronisatie</div>
      <div class="stack">
        <div class="note">De app is gekoppeld aan Google Sheets.</div>
        <div class="note mono">${escapeHtml(state.sheetsUrl)}</div>
        <div class="inline">
          <button class="btn secondary" onclick="loadFromSheets()" style="flex:1">Ophalen</button>
          <button class="btn secondary" onclick="saveToSheets()" style="flex:1">Opslaan</button>
        </div>
      </div>
    </div>
  `;
}
function escapeHtml(v){
  return String(v ?? '').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}
function updateIncomeName(idx, value){ state.inkomsten[idx].naam = value.trim(); persistLocal(); renderDashboard(); }
function updateIncomeAmount(idx, value){ state.inkomsten[idx].bedrag = Number(value||0); persistLocal(); rerenderAll(); }
function addCategory(){
  const name = prompt('Naam van de nieuwe categorie?');
  if(!name) return;
  state.categorieen.push({ id: uid('cat'), naam: name.trim(), volgorde: state.categorieen.length + 1 });
  persistLocal(); renderBudget();
}
function renameCategory(catId, value){
  const cat = state.categorieen.find(c=>c.id===catId); if(!cat) return;
  cat.naam = value.trim() || 'Nieuwe categorie'; persistLocal(); rerenderAll();
}
function removeCategory(catId){
  if(!confirm('Categorie verwijderen inclusief alle posten?')) return;
  state.categorieen = state.categorieen.filter(c=>c.id!==catId);
  state.budget = state.budget.filter(r=>r.categorieId!==catId);
  persistLocal(); rerenderAll();
}
function toggleCategory(catId){ state.openCats[catId] = !state.openCats[catId]; renderBudget(); }
function addBudgetPost(catId){
  state.budget.push({ id: uid('bud'), categorieId: catId, post: 'Nieuwe post', budget: 0, volgorde: itemsForCategory(catId).length + 1 });
  state.openCats[catId] = true; persistLocal(); renderBudget();
}
function renameBudgetPost(id, value){
  const row = state.budget.find(r=>r.id===id); if(!row) return;
  row.post = value.trim() || 'Nieuwe post'; persistLocal(); rerenderAll();
}
function updateBudgetAmount(id, value){
  const row = state.budget.find(r=>r.id===id); if(!row) return;
  row.budget = Number(value||0); persistLocal(); rerenderAll();
}
function removeBudgetPost(id){ state.budget = state.budget.filter(r=>r.id!==id); persistLocal(); rerenderAll(); }
function updateLoanName(idx, value){ state.leningen[idx].naam = value.trim(); persistLocal(); renderLeningen(); }
function updateLoanTotal(idx, value){ state.leningen[idx].totaal = Number(value||0); persistLocal(); renderLeningen(); }
function updateLoanPaid(idx, value){ state.leningen[idx].betaald = Number(value||0); persistLocal(); renderLeningen(); }
function addLoan(){ state.leningen.push({ id:uid('ln'), naam:'Nieuwe lening', totaal:0, betaald:0, kleur:'#7c6af7' }); persistLocal(); renderLeningen(); }
async function loadFromSheets(){
  updateSyncBadge('Ophalen...');
  try{
    const result = await sheetsGet();
    if(result?.ok){
      applySheets(result);
      updateSyncBadge('Sheets');
      showToast('Data opgehaald');
    }else{
      updateSyncBadge('Fout');
      showToast(result?.error || 'Ophalen mislukt');
    }
  }catch(e){
    updateSyncBadge('Fout');
    showToast('Ophalen mislukt');
  }
}
async function saveToSheets(){
  const status = document.getElementById('save-status');
  if(status) status.textContent = 'Opslaan...';
  updateSyncBadge('Opslaan...');
  try{
    const result = await sheetsPost(toRows());
    if(result?.ok){
      persistLocal();
      if(status) status.textContent = 'Opgeslagen in Sheets';
      updateSyncBadge('Sheets');
      showToast('Opgeslagen');
    }else{
      if(status) status.textContent = result?.error || 'Opslaan mislukt';
      updateSyncBadge('Fout');
      showToast(result?.error || 'Opslaan mislukt');
    }
  }catch(e){
    if(status) status.textContent = 'Opslaan mislukt';
    updateSyncBadge('Fout');
    showToast('Opslaan mislukt');
  }
}
async function init(){
  restoreLocal();
  normalizeData();
  rerenderAll();
  try{
    const result = await sheetsGet();
    if(result?.ok){
      applySheets(result);
      updateSyncBadge('Sheets');
    }else{
      updateSyncBadge('Cache');
    }
  }catch(e){
    updateSyncBadge('Cache');
  }
  document.getElementById('startup-overlay').style.display = 'none';
}
init();
</script>
