<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" sizes="180x180" href="budget-icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="budget-icon-512.png">
<title>Budget · Veenstra</title>
<style>
:root{
  --bg:#050505;
  --surface:#0b0b0b;
  --surface2:#121212;
  --surface3:#1a1a1a;
  --border:rgba(255,255,255,0.06);
  --text:#f5f5f5;
  --muted:#9aa0a6;

  /* RGB accents */
  --accent:#ff3cac;
  --accent2:#2b86ff;
  --green:#00ffa3;
  --red:#ff4d4f;
  --amber:#ffc857;

  --shadow:0 10px 30px rgba(0,0,0,.5);
}

body[data-theme="midnight"]{
  --bg:#050505;
  --surface:#0b0b0b;
  --surface2:#121212;
  --surface3:#1a1a1a;
  --border:rgba(255,255,255,0.06);
  --text:#f5f5f5;
  --muted:#9aa0a6;
  --accent:#ff3cac;
  --accent2:#2b86ff;
  --green:#00ffa3;
  --red:#ff4d4f;
  --amber:#ffc857;
  --shadow:0 10px 30px rgba(0,0,0,.5);
}
body[data-theme="carbon"]{
  --bg:#08090b;
  --surface:#101214;
  --surface2:#171b1f;
  --surface3:#20262d;
  --border:rgba(255,255,255,0.07);
  --text:#eef2f5;
  --muted:#9ba6b2;
  --accent:#69a7ff;
  --accent2:#8ef0d1;
  --green:#8ef0d1;
  --red:#ff7d7d;
  --amber:#ffd479;
  --shadow:0 10px 30px rgba(0,0,0,.38);
}
body[data-theme="sakura"]{
  color-scheme:dark;
  --bg:#0b080d;
  --surface:#151018;
  --surface2:#1b1320;
  --surface3:#261b2b;
  --border:rgba(255,218,230,0.12);
  --text:#fff7fb;
  --muted:#c8b3bf;
  --accent:#ff79b0;
  --accent2:#ffd2e2;
  --green:#7cf0c5;
  --red:#ff7aa8;
  --amber:#ffd27a;
  --shadow:
    0 24px 60px rgba(0,0,0,.55),
    0 10px 28px rgba(0,0,0,.32),
    0 0 30px rgba(255,121,176,.10);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,150,200,.18) 0%, transparent 34%),
    radial-gradient(circle at 84% 20%, rgba(255,210,230,.10) 0%, transparent 28%),
    radial-gradient(circle at 50% 120%, rgba(255,115,175,.12) 0%, transparent 44%),
    linear-gradient(180deg,#140d15 0%, #0b080d 58%, #09070b 100%);
}
body[data-theme="sakura"] .header{
  background:linear-gradient(180deg,rgba(14,10,15,.96) 0%, rgba(14,10,15,.82) 72%, rgba(14,10,15,0) 100%);
  backdrop-filter:blur(18px) saturate(155%);
}
body[data-theme="sakura"] .title span,
body[data-theme="sakura"] .cat-b,
body[data-theme="sakura"] .category-total,
body[data-theme="sakura"] .sq-val,
body[data-theme="sakura"] .top3-amount{
  color:#ffc6dc !important;
  text-shadow:0 0 14px rgba(255,121,176,.18);
}
body[data-theme="sakura"] .card,
body[data-theme="sakura"] .sq-bar,
body[data-theme="sakura"] .top3-row,
body[data-theme="sakura"] .alloc-wrap,
body[data-theme="sakura"] .loan-hero,
body[data-theme="sakura"] .loan-stat,
body[data-theme="sakura"] .loan-metric,
body[data-theme="sakura"] .insight-card,
body[data-theme="sakura"] .premium-cat-card,
body[data-theme="sakura"] .menu-sheet{
  background:
    linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015)),
    rgba(24,17,27,.82);
  border:1px solid rgba(255,218,230,.12);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    0 20px 44px rgba(0,0,0,.42),
    0 0 22px rgba(255,121,176,.06);
  backdrop-filter:blur(16px) saturate(145%);
}
body[data-theme="sakura"] .hero,
body[data-theme="sakura"] .loan-hero{
  background:
    radial-gradient(circle at top right, rgba(255,154,197,.14), transparent 34%),
    radial-gradient(circle at bottom left, rgba(255,215,232,.06), transparent 34%),
    linear-gradient(135deg, rgba(33,24,36,.96), rgba(20,15,24,.96) 52%, rgba(15,11,18,.98));
  border:1px solid rgba(255,197,219,.14);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    0 24px 50px rgba(0,0,0,.46),
    0 0 30px rgba(255,121,176,.09);
}
body[data-theme="sakura"] .hero::before{
  background:radial-gradient(circle,rgba(255,137,187,.18) 0%, transparent 72%);
}
body[data-theme="sakura"] .hero-label,
body[data-theme="sakura"] .hero-sub-label,
body[data-theme="sakura"] .loan-stat-label,
body[data-theme="sakura"] .alloc-val,
body[data-theme="sakura"] .category-meta,
body[data-theme="sakura"] .cat-meta,
body[data-theme="sakura"] .sq-label,
body[data-theme="sakura"] .sq-note,
body[data-theme="sakura"] .top3-sub,
body[data-theme="sakura"] .note,
body[data-theme="sakura"] .muted{
  color:var(--muted) !important;
}
body[data-theme="sakura"] .hero-sub-val,
body[data-theme="sakura"] .loan-hero-pct{
  color:#ffd4e3 !important;
  text-shadow:0 0 18px rgba(255,121,176,.18) !important;
}
body[data-theme="sakura"] .hero-amount.pos{
  color:var(--green);
  text-shadow:0 0 16px rgba(124,240,197,.26);
}
body[data-theme="sakura"] .hero-amount.neg{
  color:var(--red);
  text-shadow:0 0 16px rgba(255,122,168,.28);
}
body[data-theme="sakura"] .btn,
body[data-theme="sakura"] .loan-addpay{
  background:linear-gradient(135deg,#ff78b0 0%, #e45f9a 48%, #b44d82 100%);
  color:#fff8fb;
  border:1px solid rgba(255,215,229,.14);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.16),
    0 14px 28px rgba(180,77,130,.28),
    0 0 20px rgba(255,121,176,.12);
}
body[data-theme="sakura"] .btn.secondary,
body[data-theme="sakura"] .pill-btn,
body[data-theme="sakura"] .collapse-btn,
body[data-theme="sakura"] .badge-btn,
body[data-theme="sakura"] .loan-edit-btn,
body[data-theme="sakura"] .icon-btn,
body[data-theme="sakura"] .swipe-mini-btn,
body[data-theme="sakura"] .menu-btn,
body[data-theme="sakura"] .loan-save{
  background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015)), rgba(27,19,32,.92);
  color:var(--text);
  border:1px solid rgba(255,218,230,.12);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}
body[data-theme="sakura"] .btn.ghost{
  background:rgba(255,121,176,.08);
  border:1px solid rgba(255,169,205,.2);
  color:#ffd7e5;
}
body[data-theme="sakura"] .input,
body[data-theme="sakura"] .subtab,
body[data-theme="sakura"] .post-row .input,
body[data-theme="sakura"] .category-inner,
body[data-theme="sakura"] .post-row{
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
    rgba(18,13,22,.9);
  border:1px solid rgba(255,218,230,.10);
  color:var(--text);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
body[data-theme="sakura"] .tab.active,
body[data-theme="sakura"] .subtab.active{
  background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02)), rgba(31,22,36,.96);
  border-color:rgba(255,195,218,.16);
  color:var(--text);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    0 10px 22px rgba(0,0,0,.24),
    0 0 16px rgba(255,121,176,.08);
}
body[data-theme="sakura"] .prog,
body[data-theme="sakura"] .track,
body[data-theme="sakura"] .alloc-bar{
  background:rgba(255,255,255,.05);
}
body[data-theme="sakura"] .prog-fill,
body[data-theme="sakura"] .fill,
body[data-theme="sakura"] .alloc-fill{
  background:linear-gradient(90deg,#ffd8e5 0%, #ff8dbd 38%, #ff6fa7 65%, #d95b91 100%) !important;
  box-shadow:
    0 0 12px rgba(255,121,176,.26),
    0 0 24px rgba(255,121,176,.12) !important;
}
body[data-theme="sakura"] .loan-percent-badge,
body[data-theme="sakura"] .loan-hero-pct{
  background:linear-gradient(90deg,#ffe1eb 0%, #ff9dc7 50%, #ff74ab 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent !important;
  text-shadow:none !important;
}
body[data-theme="sakura"] .swipe-delete-bg{
  background:linear-gradient(135deg,rgba(255,122,168,.18),rgba(255,122,168,.08));
}
body[data-theme="sakura"] .premium-cat-card::after{
  background:radial-gradient(circle,rgba(255,210,228,.10),transparent 70%);
}
body[data-theme="sakura"] .menu-handle{
  background:rgba(255,218,230,.14);
}
body[data-theme="sakura"] #menu-overlay{
  background:rgba(6,4,8,.58);
}
#sakura-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:20;
  overflow:hidden;
  display:none;
}
body[data-theme="sakura"] #sakura-layer{
  display:block;
}
.sakura-petal{
  position:absolute;
  top:-40px;
  width:12px;
  height:12px;
  background:radial-gradient(circle at 30% 30%, #fff9fc 0%, #ffdce9 45%, #ffb4cf 100%);
  border-radius:72% 0 72% 0;
  opacity:.42;
  filter:blur(.2px) drop-shadow(0 2px 6px rgba(255,105,135,.18));
  mix-blend-mode:screen;
  animation-name:sakuraFall;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
}
@keyframes sakuraFall{
  0%{transform:translate3d(0,0,0) rotate(0deg) scale(.9); opacity:0}
  12%{opacity:.46}
  100%{transform:translate3d(var(--drift,40px),110vh,0) rotate(360deg) scale(1.08); opacity:.08}
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
.shell{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:calc(env(safe-area-inset-top,0px) + 18px) 20px 0;position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 86%, rgba(10,10,15,0));backdrop-filter:blur(12px);z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.title{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.title span{color:var(--accent)}
.badge-btn{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 10px;font-family:monospace;cursor:pointer}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;font-size:13px;font-weight:600;padding:8px 16px;border-radius:20px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--muted);transition:all .18s ease;font-family:inherit}
.tab.active{background:var(--surface2);border-color:var(--border);color:var(--text);box-shadow:var(--shadow)}
.subtabs{display:flex;gap:8px;margin-bottom:12px}
.subtab{flex:1;font-size:12px;font-weight:700;padding:10px 14px;border-radius:14px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .18s ease;font-family:inherit}
.subtab.active{background:var(--surface2);color:var(--text);border-color:rgba(124,106,247,.3)}
.content{flex:1;padding:10px 20px calc(env(safe-area-inset-bottom,0px) + 40px)}
.view{display:none}
.view.active{display:block}
.view.anim-enter-right{display:block;animation:slideEnterRight .26s ease both}
.view.anim-enter-left{display:block;animation:slideEnterLeft .26s ease both}
.view.anim-exit-left{display:block;animation:slideExitLeft .26s ease both}
.view.anim-exit-right{display:block;animation:slideExitRight .26s ease both}
@keyframes slideEnterRight{from{opacity:.6;transform:translateX(26px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideEnterLeft{from{opacity:.6;transform:translateX(-26px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideExitLeft{from{opacity:1;transform:translateX(0)}to{opacity:.4;transform:translateX(-26px)}}
@keyframes slideExitRight{from{opacity:1;transform:translateX(0)}to{opacity:.4;transform:translateX(26px)}}
.hero{background:linear-gradient(135deg,#0b0b0b,#111,#161616);border:1px solid rgba(143,163,184,.18);border-radius:24px;padding:24px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(124,106,247,.15) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:11px;color:rgba(240,240,248,.65);letter-spacing:1px;font-family:monospace;margin-bottom:6px}
.hero-amount{font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1}
.hero-amount.pos{color:var(--green)}.hero-amount.neg{color:var(--red)}
.hero-sub{display:flex;gap:20px;margin-top:16px}
.hero-sub-label{font-size:10px;color:rgba(240,240,248,.65);font-family:monospace;margin-bottom:3px}
.hero-sub-val{font-size:15px;font-weight:600}
.sq-bar{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px 18px;margin-bottom:16px}
.sq-top{display:flex;justify-content:space-between;margin-bottom:10px}
.sq-label{font-size:13px;font-weight:600;color:var(--muted)}
.sq-val{font-family:monospace;font-size:16px;font-weight:600;color:var(--accent2)}
.track{background:var(--surface3);border-radius:99px;height:8px;overflow:hidden}
.fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#ff3cac,#2b86ff,#00ffa3);transition:width .35s ease}
.sq-note{text-align:right;margin-top:5px;font-size:10px;color:var(--muted);font-family:monospace}
.sec{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);transition:transform .15s ease, opacity .15s ease}
.card.dragging{opacity:.45;transform:scale(.985)}
.cat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
.cat-name{font-size:15px;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-b{font-family:monospace;font-size:14px;font-weight:600;color:var(--accent)}
.cat-meta{font-size:11px;color:var(--muted);margin-top:3px}
.prog{background:var(--surface3);border-radius:99px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--accent)}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.input{font-size:16px!important;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;padding:10px 14px;width:100%;outline:none}
.input.small{width:110px;text-align:right;font-family:monospace}
.btn{background:linear-gradient(135deg,var(--accent),#9b8af7);border:none;border-radius:14px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;padding:14px 16px;cursor:pointer}
.btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid rgba(124,106,247,.35)}
.btn.danger{background:rgba(255,107,107,.14);color:var(--red);border:1px solid rgba(255,107,107,.25)}
.btn.sm{padding:8px 10px;border-radius:10px;font-size:12px}
.stack{display:flex;flex-direction:column;gap:8px}
.inline{display:flex;gap:8px;align-items:center}
.muted{color:var(--muted)}
.mono{font-family:monospace}
.post-row{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:8px;transition:transform .2s ease}
.post-row.swiping{transition:none}
.post-row-content{display:flex;justify-content:space-between;align-items:center;gap:10px;width:100%;z-index:2}
.swipe-delete-bg{position:absolute;inset:0;border-radius:12px;background:linear-gradient(135deg,rgba(255,107,107,.16),rgba(255,107,107,.08));display:flex;align-items:center;justify-content:flex-end;padding-right:16px;color:var(--red);font-size:12px;font-weight:800;opacity:0;transition:opacity .15s ease;z-index:1}
.post-row.reveal-delete .swipe-delete-bg{opacity:1}
.loan-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.loan-row:last-child{border-bottom:none}
.note{font-size:12px;color:var(--muted);line-height:1.6}
.budget-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:14px 0 10px}
.budget-toolbar-actions{display:flex;gap:8px;flex-shrink:0}
.cat-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.cat-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer}
.pill-btn{height:38px;padding:0 12px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;font-size:12px}
.category-card{position:relative;overflow:hidden}
.category-card-content{position:relative;z-index:2}
.category-actions-strip{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap}
.category-card.reveal-edit .category-actions-strip{display:flex}
.swipe-mini-btn{height:40px;padding:0 12px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-weight:800;cursor:pointer}
.swipe-mini-btn.danger{background:rgba(255,107,107,.14);color:var(--red);border-color:rgba(255,107,107,.25)}
.category-name-input{min-width:0}
.category-swipe-hint{font-size:11px;color:var(--muted);margin-top:3px}
.category-ghost-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#startup-overlay{position:fixed;inset:0;background:rgba(5,5,5,.985);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px}
.loader-wrap{width:min(320px,86vw);display:flex;flex-direction:column;align-items:center;gap:16px}
.liquid-loader{position:relative;width:120px;height:120px;filter:url(#goo)}
.liquid-loader .blob{position:absolute;inset:auto;display:block;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff3cac,#2b86ff,#00ffa3);animation:blobOrbit 2.4s ease-in-out infinite}
.liquid-loader .blob:nth-child(1){top:8px;left:40px}
.liquid-loader .blob:nth-child(2){top:40px;left:8px;animation-delay:-.6s}
.liquid-loader .blob:nth-child(3){top:40px;right:8px;animation-delay:-1.2s}
.liquid-loader .blob:nth-child(4){bottom:8px;left:40px;animation-delay:-1.8s}
.liquid-core{position:absolute;inset:28px;border-radius:50%;background:linear-gradient(135deg,#101010,#181818);border:1px solid var(--border);box-shadow:0 0 30px rgba(43,134,255,.16), inset 0 0 24px rgba(255,60,172,.08)}
@keyframes blobOrbit{
  0%,100%{transform:scale(1) translateY(0)}
  25%{transform:scale(1.08) translateY(-8px)}
  50%{transform:scale(.92) translateY(0)}
  75%{transform:scale(1.08) translateY(8px)}
}
#menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);z-index:1100;display:none;align-items:flex-end}
#menu-overlay.open{display:flex}
.menu-sheet{background:var(--surface);border-top-left-radius:24px;border-top-right-radius:24px;border:1px solid var(--border);width:100%;max-width:480px;margin:0 auto;padding:12px 16px calc(env(safe-area-inset-bottom,0px) + 20px);box-shadow:var(--shadow);animation:sheetUp .22s ease}
@keyframes sheetUp{from{transform:translateY(16px);opacity:.4}to{transform:translateY(0);opacity:1}}
.menu-handle{width:42px;height:5px;background:var(--surface3);border-radius:999px;margin:6px auto 16px}
.menu-title{font-size:17px;font-weight:800;margin-bottom:14px}
.menu-btn{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:inherit;font-size:15px;font-weight:700;padding:14px 16px;cursor:pointer;text-align:left;margin-bottom:8px}

.swipe-delete-bg{
  position:absolute;inset:0;border-radius:12px;overflow:hidden;
  display:flex;align-items:center;justify-content:flex-end;padding-right:12px;
  background:
    radial-gradient(circle at 82% 50%, rgba(255,255,255,.22), transparent 22%),
    linear-gradient(135deg, rgba(255,92,138,.92), rgba(255,111,165,.82) 48%, rgba(255,174,205,.66));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08), inset 0 0 30px rgba(255,255,255,.08), 0 0 28px rgba(255,92,138,.28);
  opacity:calc(.2 + (var(--swipe-progress) * .8));
  transform:scaleX(calc(.94 + (var(--swipe-progress) * .06)));
  transform-origin:right center;
  transition:opacity .18s ease, transform .22s ease, box-shadow .22s ease;
  z-index:1;
}
.swipe-delete-bg::before{
  content:'';position:absolute;inset:-20% auto -20% 46%;width:50%;
  background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.24) 50%, transparent 100%);
  transform:translateX(calc(60% - (var(--swipe-progress) * 90%))) skewX(-16deg);
  opacity:calc(var(--swipe-progress) * .9);
  transition:transform .18s ease, opacity .18s ease;
}
.swipe-action{
  position:relative;z-index:2;display:flex;align-items:center;gap:9px;
  padding:10px 12px;border-radius:999px;
  background:rgba(255,255,255,.12);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.14);
  box-shadow:0 10px 24px rgba(0,0,0,.18);
  color:#fff;
  opacity:calc(.15 + (var(--swipe-progress) * .85));
  transform:translateX(calc(26px - (var(--swipe-progress) * 26px))) scale(calc(.82 + (var(--swipe-progress) * .18)));
  transition:transform .18s ease, opacity .18s ease;
}
.swipe-action-icon{
  width:24px;height:24px;border-radius:999px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.18);font-size:12px;font-weight:900;
}
.swipe-action-label{font-size:12px;font-weight:800;letter-spacing:.02em}
.post-row.reveal-delete .swipe-delete-bg{opacity:1}
.post-row.reveal-delete .swipe-action{opacity:1}
.post-row.snap-open .swipe-delete-bg{box-shadow:inset 0 0 0 1px rgba(255,255,255,.08), inset 0 0 30px rgba(255,255,255,.1), 0 0 34px rgba(255,92,138,.38)}

<canvas id="confetti-layer"></canvas>
<script>
const DEFAULT_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxa-f-tmhNbPXRDgMc9VSU7nAxKtoV8hCd2twIim1Ikq58uExIrXWgnyEF0DwbMJPpmVA/exec';

const state = {
  sheetsUrl: DEFAULT_SHEETS_URL,
  inkomsten: [
    { naam:'KT', bedrag:2950 },
    { naam:'Ryanne', bedrag:1581.89 },
  ],
  categorieen: [],
  budget: [],
  leningen: [
    { id:'l1', naam:'Auto 1', totaal:2700, betaald:750, kleur:'#7c6af7' },
    { id:'l2', naam:'Auto 2', totaal:7500, betaald:0, kleur:'#4ecdc4' },
  ],
  openCats:{},
  budgetSubtab:'categorieen',
  currentView:'dashboard',
  lastNonSettingsView:'dashboard',
};

function uid(prefix){ return `${prefix}_${Date.now()}_${Math.floor(Math.random()*100000)}`; }
function fmt(n){ const v = Number(n || 0); return '€ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function fmtShort(n){ return '€' + Math.round(Number(n || 0)).toLocaleString('nl'); }
function inkomstenTotaal(){ return state.inkomsten.reduce((s,r)=>s + Number(r.bedrag || 0), 0); }
function budgetTotaal(){ return state.budget.reduce((s,r)=>s + Number(r.budget || 0), 0); }
function overschot(){ return inkomstenTotaal() - budgetTotaal(); }
function spaarquote(){ const inc = inkomstenTotaal(); return inc ? (overschot() / inc) * 100 : 0; }
function orderedCats(){ return [...state.categorieen].sort((a,b)=>(a.volgorde||0)-(b.volgorde||0)); }
function itemsForCategory(catId){ return state.budget.filter(r=>String(r.categorieId) === String(catId)).sort((a,b)=>(a.volgorde||0)-(b.volgorde||0)); }
function totalForCategory(catId){ return itemsForCategory(catId).reduce((s,r)=>s + Number(r.budget || 0), 0); }
function postsCount(catId){ return itemsForCategory(catId).length; }

function persistLocal(){
  const cache = {
    inkomsten: state.inkomsten,
    categorieen: state.categorieen,
    budget: state.budget,
    leningen: state.leningen
  };
  localStorage.setItem('bv_budget_state_v3', JSON.stringify(cache));
}
function restoreLocal(){
  try{
    const raw = localStorage.getItem('bv_budget_state_v3');
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(parsed.inkomsten) state.inkomsten = parsed.inkomsten;
    if(parsed.categorieen) state.categorieen = parsed.categorieen;
    if(parsed.budget) state.budget = parsed.budget;
    if(parsed.leningen) state.leningen = parsed.leningen;
  }catch(e){}
}
async function safeJson(res){
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e){ return { ok:false, error:'Parse fout', raw:text.slice(0,200) }; }
}
async function sheetsGet(){
  const res = await fetch(state.sheetsUrl + '?action=getAll', { redirect:'follow' });
  return safeJson(res);
}
async function sheetsPost(data){
  const res = await fetch(state.sheetsUrl, { method:'POST', redirect:'follow', body: JSON.stringify(data) });
  return safeJson(res);
}
function normalizeData(){
  state.categorieen = orderedCats().map((cat, idx)=>({
    id: String(cat.id || uid('cat')),
    naam: String(cat.naam || 'Nieuwe categorie'),
    volgorde: idx + 1
  }));
  state.budget = state.budget.map(row=>({
    id: String(row.id || uid('bud')),
    categorieId: String(row.categorieId || ''),
    post: String(row.post || 'Nieuwe post'),
    budget: Number(row.budget || 0),
    volgorde: Number(row.volgorde || 0)
  }));
  const validCatIds = new Set(state.categorieen.map(c=>c.id));
  state.budget = state.budget.filter(r=>validCatIds.has(r.categorieId));
  for (const cat of state.categorieen){
    const rows = itemsForCategory(cat.id);
    rows.forEach((row, idx)=>{ row.volgorde = idx + 1; });
  }
}
function toRows(){
  normalizeData();
  return {
    action:'saveAll',
    inkomsten: state.inkomsten.map(r=>({
      naam: r.naam || '',
      bedrag: Number(r.bedrag || 0)
    })),
    categorieen: orderedCats().map((c,i)=>({
      id: c.id,
      naam: c.naam || '',
      volgorde: i + 1
    })),
    budget: orderedCats().flatMap(c =>
      itemsForCategory(c.id).map((r, rowIndex)=>({
        id: r.id,
        categorieId: c.id,
        post: r.post || '',
        budget: Number(r.budget || 0),
        volgorde: rowIndex + 1
      }))
    ),
    leningen: state.leningen.map(r=>({
      id: r.id,
      naam: r.naam || '',
      totaal: Number(r.totaal || 0),
      betaald: Number(r.betaald || 0),
      kleur: r.kleur || '#7c6af7'
    }))
  };
}
function applySheets(data){
  if(data.inkomsten) state.inkomsten = data.inkomsten.map(r=>({ naam: String(r.naam || ''), bedrag: Number(r.bedrag || 0) }));
  if(data.categorieen) state.categorieen = data.categorieen.map((r,i)=>({ id: String(r.id || uid('cat')), naam: String(r.naam || ''), volgorde: Number(r.volgorde || (i+1)) }));
  if(data.budget) state.budget = data.budget.map((r,i)=>({ id: String(r.id || uid('bud')), categorieId: String(r.categorieId || ''), post: String(r.post || ''), budget: Number(r.budget || 0), volgorde: Number(r.volgorde || (i+1)) }));
  if(data.leningen) state.leningen = data.leningen.map(r=>({ id: String(r.id || uid('ln')), naam: String(r.naam || ''), totaal: Number(r.totaal || 0), betaald: Number(r.betaald || 0), kleur: String(r.kleur || '#7c6af7') }));
  normalizeData();
  persistLocal();
  rerenderAll();
}
function rerenderAll(){
  renderDashboard();
  renderBudget();
  renderLeningen();
  renderInstellingen();
}
const VIEW_ORDER = ['dashboard','budget','leningen','instellingen'];
const appSwipe = {startX:0, startY:0, dx:0, dy:0};
function appSwipeStart(e){
  const t = e.changedTouches[0];
  appSwipe.startX = t.clientX;
  appSwipe.startY = t.clientY;
  appSwipe.dx = 0;
  appSwipe.dy = 0;
}
function appSwipeMove(e){
  const t = e.changedTouches[0];
  appSwipe.dx = t.clientX - appSwipe.startX;
  appSwipe.dy = t.clientY - appSwipe.startY;
}
function appSwipeEnd(e){
  const absX = Math.abs(appSwipe.dx);
  const absY = Math.abs(appSwipe.dy);
  if(absX < 60 || absX < absY * 1.4) return;
  const activeEl = document.querySelector('.view.active');
  if(!activeEl) return;
  const current = activeEl.id.replace('v-','');
  const idx = VIEW_ORDER.indexOf(current);
  if(idx < 0) return;
  // ignore swipe if user is interacting with input/textarea/select/button inside budget cards
  const target = e.target;
  const tag = (target && target.tagName || '').toLowerCase();
  if(['input','textarea','select','button'].includes(tag)) return;
  if(appSwipe.dx < 0 && idx < VIEW_ORDER.length - 1){
    const next = VIEW_ORDER[idx + 1];
    const btn = [...document.querySelectorAll('.tab')].find(b => b.textContent.trim().toLowerCase() === next) || document.getElementById('settings-tab-btn');
    if(btn) go(next, btn);
  } else if(appSwipe.dx > 0 && idx > 0){
    const prev = VIEW_ORDER[idx - 1];
    const btn = [...document.querySelectorAll('.tab')].find(b => b.textContent.trim().toLowerCase() === prev) || document.querySelectorAll('.tab')[0];
    if(btn) go(prev, btn);
  }
}

function showToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:11px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(124,106,247,.4);font-family:inherit';
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2200);
}
function go(name,btn){
  const currentEl = document.querySelector('.view.active');
  const current = currentEl ? currentEl.id.replace('v-','') : null;
  const order = ['dashboard','budget','leningen','instellingen'];
  const oldIdx = Math.max(0, order.indexOf(current));
  const newIdx = Math.max(0, order.indexOf(name));
  const dir = newIdx >= oldIdx ? 'left' : 'right';

  if(name === 'instellingen' && current && current !== 'instellingen') state.lastNonSettingsView = current;
  if(name !== 'instellingen') state.lastNonSettingsView = name;
  state.currentView = name;

  if(name==='dashboard') renderDashboard();
  if(name==='budget') renderBudget();
  if(name==='leningen') renderLeningen();
  if(name==='instellingen') renderInstellingen();

  const nextEl = document.getElementById('v-'+name);

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.view').forEach(v=>{
    v.classList.remove('anim-enter-right','anim-enter-left','anim-exit-left','anim-exit-right');
    if(v !== nextEl) v.classList.remove('active');
  });

  if(currentEl && currentEl !== nextEl){
    currentEl.classList.add(dir === 'left' ? 'anim-exit-left' : 'anim-exit-right');
    setTimeout(()=>currentEl.classList.remove('active','anim-exit-left','anim-exit-right'), 240);
  }

  nextEl.classList.add('active', dir === 'left' ? 'anim-enter-right' : 'anim-enter-left');
  setTimeout(()=>nextEl.classList.remove('anim-enter-right','anim-enter-left'), 260);
}
function openSettings(){
  const btn = document.getElementById('settings-tab-btn');
  go('instellingen', btn);
}
function closeSettings(){
  const target = state.lastNonSettingsView || 'dashboard';
  const btn = [...document.querySelectorAll('.tab')].find(b => b.textContent.trim().toLowerCase() === target) || document.querySelector('.tab');
  if(btn) go(target, btn);
}
function setBudgetSubtab(tab){ state.budgetSubtab = tab; renderBudget(); }

function syncSakuraPetals(){
  const layer = document.getElementById('sakura-layer');
  if(!layer) return;
  const isSakura = document.body.getAttribute('data-theme') === 'sakura';
  layer.innerHTML = '';
  if(!isSakura) return;
  const count = Math.min(18, Math.max(10, Math.floor(window.innerWidth / 28)));
  for(let i=0;i<count;i++){
    const petal = document.createElement('span');
    petal.className = 'sakura-petal';
    petal.style.left = `${Math.random()*100}%`;
    petal.style.animationDuration = `${8 + Math.random()*8}s`;
    petal.style.animationDelay = `${-Math.random()*10}s`;
    petal.style.setProperty('--drift', `${-60 + Math.random()*120}px`);
    petal.style.transform = `scale(${0.75 + Math.random()*0.8})`;
    layer.appendChild(petal);
  }
}
const THEME_KEY = 'bv_theme_pref_v2';
const LEGACY_THEME_KEY = 'bv_theme';
const THEME_COLORS = {
  midnight:'#0a0a0f',
  carbon:'#101214',
  sakura:'#140d15'
};
const ALLOWED_THEMES = new Set(['midnight','carbon','sakura']);

function updateThemeMeta(theme){
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', THEME_COLORS[theme] || THEME_COLORS.midnight);
}

function getStoredTheme(){
  try{
    const stored = localStorage.getItem(THEME_KEY);
    const legacy = localStorage.getItem(LEGACY_THEME_KEY);
    const resolved = stored || legacy || 'midnight';
    if(ALLOWED_THEMES.has(resolved)){
      if(!stored) localStorage.setItem(THEME_KEY, resolved);
      return resolved;
    }
  }catch(e){}
  return 'midnight';
}

function syncThemeSelection(theme){
  const root = document.getElementById('v-instellingen');
  if(!root || !root.children.length) return;
  const themeLabel = theme === 'midnight' ? 'Midnight RGB' : theme === 'carbon' ? 'Carbon' : 'Sakura v2';
  const badge = root.querySelector('.settings-badge');
  const value = root.querySelector('.current-theme-value');
  if(badge) badge.textContent = themeLabel;
  if(value) value.textContent = themeLabel;
  root.querySelectorAll('.theme-tile').forEach(tile => {
    const tileTheme = tile.getAttribute('data-theme');
    const active = tileTheme === theme;
    tile.classList.toggle('active', active);
    tile.setAttribute('aria-selected', String(active));
  });
}

function applyTheme(theme, options = {}){
  const resolved = ALLOWED_THEMES.has(theme) ? theme : 'midnight';
  const shouldPersist = options.persist !== false;
  document.body.setAttribute('data-theme', resolved);
  document.documentElement.style.colorScheme = 'dark';
  updateThemeMeta(resolved);
  if(shouldPersist){
    try{
      localStorage.setItem(THEME_KEY, resolved);
      localStorage.setItem(LEGACY_THEME_KEY, resolved);
    }catch(e){}
  }
  syncSakuraPetals();
  syncThemeSelection(resolved);
}

// Optimized swipe to delete
const swipeState = {};
const SWIPE_MAX = 120;
const SWIPE_SNAP = 88;
const SWIPE_REVEAL = 34;
const SWIPE_DELETE_THRESHOLD = 108;

function setSwipeX(stateRef, x){
  stateRef.x = x;
  if(stateRef.frame) return;
  stateRef.frame = requestAnimationFrame(() => {
    stateRef.frame = null;
    const row = stateRef.row;
    const content = stateRef.content;
    if(!row || !content) return;
    const nextX = stateRef.x || 0;
    const progress = Math.min(1, Math.max(0, Math.abs(nextX) / SWIPE_DELETE_THRESHOLD));
    row.style.setProperty('--swipe-progress', progress.toFixed(3));
    row.classList.toggle('reveal-delete', Math.abs(nextX) > SWIPE_REVEAL);
    row.classList.toggle('snap-open', Math.abs(nextX) > SWIPE_SNAP * 0.92);
    content.style.transform = `translate3d(${nextX}px,0,0)`;
  });
}

function closeSwipeRow(row){
  if(!row) return;
  const content = row.querySelector('.post-row-content');
  if(content){
    content.style.transition = 'transform .22s cubic-bezier(.22,1,.36,1)';
    content.style.transform = 'translate3d(0,0,0)';
  }
  row.classList.remove('reveal-delete','snap-open','swiping');
  row.style.setProperty('--swipe-progress', 0);
}

function openSwipeRow(row){
  if(!row) return;
  const content = row.querySelector('.post-row-content');
  if(content){
    content.style.transition = 'transform .22s cubic-bezier(.22,1,.36,1)';
    content.style.transform = `translate3d(-${SWIPE_SNAP}px,0,0)`;
  }
  row.classList.add('reveal-delete','snap-open');
  row.style.setProperty('--swipe-progress', 1);
}

function closeOtherSwipeRows(activeId){
  document.querySelectorAll('.post-row.reveal-delete, .post-row.snap-open').forEach(row => {
    if(row.dataset.id !== String(activeId)) closeSwipeRow(row);
  });
}

function swipeStart(e, id){
  const touch = e.changedTouches[0];
  const row = document.querySelector(`.post-row[data-id="${id}"]`);
  if(!row) return;
  closeOtherSwipeRows(id);
  const content = row.querySelector('.post-row-content');
  const currentOpen = row.classList.contains('snap-open') ? -SWIPE_SNAP : 0;
  swipeState[id] = {
    row,
    content,
    startX: touch.clientX,
    startY: touch.clientY,
    x: currentOpen,
    baseX: currentOpen,
    locked: false,
    isHorizontal: false,
    frame: null
  };
  row.classList.add('swiping');
  if(content) content.style.transition = 'none';
}

function swipeMove(e, id){
  const stateRef = swipeState[id];
  if(!stateRef || !stateRef.row) return;
  const touch = e.changedTouches[0];
  const rawDx = touch.clientX - stateRef.startX;
  const rawDy = touch.clientY - stateRef.startY;

  if(!stateRef.locked){
    if(Math.abs(rawDx) < 6 && Math.abs(rawDy) < 6) return;
    stateRef.locked = true;
    stateRef.isHorizontal = Math.abs(rawDx) > Math.abs(rawDy) * 1.2;
  }
  if(!stateRef.isHorizontal) return;

  e.preventDefault();

  let nextX = stateRef.baseX + rawDx;
  if(nextX > 18) nextX = 18 - Math.pow(18 - nextX, 0.72);
  if(nextX < -SWIPE_MAX) nextX = -SWIPE_MAX - Math.pow(Math.abs(nextX + SWIPE_MAX), 0.76) * 0.16;
  nextX = Math.max(-SWIPE_MAX - 12, Math.min(12, nextX));
  setSwipeX(stateRef, nextX);
}

function swipeEnd(e, id){
  const stateRef = swipeState[id];
  if(!stateRef || !stateRef.row) return;
  const row = stateRef.row;
  const dx = stateRef.x || 0;
  row.classList.remove('swiping');

  if(stateRef.frame){
    cancelAnimationFrame(stateRef.frame);
    stateRef.frame = null;
  }

  if(dx <= -SWIPE_DELETE_THRESHOLD){
    openSwipeRow(row);
    setTimeout(() => {
      if(confirm('Post verwijderen?')) removeBudgetPost(id);
      else closeSwipeRow(row);
    }, 70);
  } else if(dx <= -SWIPE_REVEAL){
    openSwipeRow(row);
  } else {
    closeSwipeRow(row);
  }

  delete swipeState[id];
}
async function loadFromSheets(){
  const saveStatus = document.getElementById('save-status');
  if(saveStatus) saveStatus.textContent = 'Ophalen...';
  try{
    const result = await sheetsGet();
    if(result?.ok){
      applySheets(result);
      showToast('Data opgehaald');
      if(saveStatus) saveStatus.textContent = 'Vers geladen uit Sheets';
    }else{
      showToast(result?.error || 'Ophalen mislukt');
      if(saveStatus) saveStatus.textContent = 'Ophalen mislukt';
    }
  }catch(e){
    showToast('Ophalen mislukt');
    if(saveStatus) saveStatus.textContent = 'Ophalen mislukt';
  }
}
async function saveToSheets(){
  const status = document.getElementById('save-status');
  if(status) status.textContent = 'Opslaan...';
  try{
    const result = await sheetsPost(toRows());
    if(result?.ok){
      persistLocal();
      if(status) status.textContent = 'Opgeslagen in Sheets';
      showToast('Opgeslagen');
    }else{
      if(status) status.textContent = result?.error || 'Opslaan mislukt';
      showToast(result?.error || 'Opslaan mislukt');
    }
  }catch(e){
    if(status) status.textContent = 'Opslaan mislukt';
    showToast('Opslaan mislukt');
  }
}
async function init(){
  restoreLocal();
  normalizeData();
  rerenderAll();
  try{
    const result = await sheetsGet();
    if(result?.ok){
      applySheets(result);
    }
  }catch(e){}
  document.getElementById('startup-overlay').style.display = 'none';
}
