<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#0a0a0f">
<title>Budget · Veenstra</title>
<style>
:root {
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#242432;
  --border:rgba(255,255,255,0.07);--text:#f0f0f8;--muted:#6b6b88;
  --accent:#7c6af7;--accent2:#4ecdc4;--green:#3ddc84;--red:#ff6b6b;--amber:#ffbe0b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
.shell{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:calc(env(safe-area-inset-top,0px) + 20px) 20px 0;position:sticky;top:0;background:var(--bg);z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.title{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.title span{color:var(--accent)}
.badge{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-family:monospace}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;font-size:13px;font-weight:600;padding:7px 16px;border-radius:20px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--muted);transition:all .15s;font-family:inherit}
.tab.active{background:var(--surface2);border-color:var(--border);color:var(--text)}
.content{flex:1;padding:10px 20px calc(env(safe-area-inset-bottom,0px) + 40px)}
.view{display:none}.view.active{display:block}
/* Hero */
.hero{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border:1px solid rgba(124,106,247,.25);border-radius:20px;padding:24px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(124,106,247,.15) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:11px;color:var(--muted);letter-spacing:1px;font-family:monospace;margin-bottom:6px}
.hero-amount{font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1}
.hero-amount.pos{color:var(--green)}.hero-amount.neg{color:var(--red)}
.hero-sub{display:flex;gap:20px;margin-top:16px}
.hero-sub-label{font-size:10px;color:var(--muted);font-family:monospace;margin-bottom:3px}
.hero-sub-val{font-size:15px;font-weight:600}
/* Spaarquote */
.sq-bar{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 18px;margin-bottom:16px}
.sq-top{display:flex;justify-content:space-between;margin-bottom:10px}
.sq-label{font-size:13px;font-weight:600;color:var(--muted)}
.sq-val{font-family:monospace;font-size:16px;font-weight:500;color:var(--accent2)}
.track{background:var(--surface3);border-radius:99px;height:8px;overflow:hidden}
.fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease}
.sq-note{text-align:right;margin-top:5px;font-size:10px;color:var(--muted);font-family:monospace}
/* Section title */
.sec{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 10px}
/* Cat cards */
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:8px;cursor:pointer}
.cat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cat-name{font-size:15px;font-weight:700}
.cat-amounts{display:flex;gap:6px;align-items:baseline}
.cat-b{font-family:monospace;font-size:12px;color:var(--muted)}
.cat-w{font-family:monospace;font-size:14px;font-weight:500}
.cat-w.over{color:var(--red)}.cat-w.ok{color:var(--green)}.cat-w.neu{color:var(--accent)}
.prog{background:var(--surface3);border-radius:99px;height:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}
.prog-fill.over{background:var(--red)}.prog-fill.ok{background:var(--green)}.prog-fill.neu{background:var(--accent)}
/* Income inputs */
.inc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.inc-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
.inc-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.inc-input{font-size:16px!important;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--green);font-family:monospace;font-size:18px;font-weight:500;width:calc(100% - 16px);outline:none;padding:2px 0}
/* Budget rows */
.bud-section{margin-bottom:14px}
.bud-hdr{background:var(--surface2);border-radius:16px 16px 0 0;padding:10px 16px;display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--muted)}
.bud-hdr span:last-child{font-family:monospace;color:var(--accent)}
.bud-row{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.bud-row.last{border-radius:0 0 16px 16px;border-bottom:none}
.bud-post{font-size:13px;color:var(--muted);padding-left:12px}
.bud-input-wrap{position:relative;display:flex;align-items:center}
.bud-eur{position:absolute;left:9px;color:var(--muted);font-family:monospace;font-size:12px;pointer-events:none}
.bud-input{font-size:16px!important;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:monospace;font-size:14px;padding:6px 10px 6px 24px;width:88px;text-align:right;outline:none}
.bud-total{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bud-total-label{font-size:14px;font-weight:700}
.bud-total-val{font-family:monospace;font-size:16px;color:var(--accent)}
/* TX form */
.tx-form{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:20px}
.tx-form-title{font-size:15px;font-weight:700;margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.form-input,.form-select{font-size:16px!important;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;width:100%;outline:none;-webkit-appearance:none;margin-bottom:10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-btn{width:100%;background:linear-gradient(135deg,var(--accent),#9b8af7);border:none;border-radius:14px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;padding:14px;cursor:pointer;margin-top:4px}
/* Filter chips */
.chips{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:12px;font-weight:600;padding:5px 12px;cursor:pointer;font-family:inherit}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* TX items */
.tx-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.tx-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tx-dot.debit{background:var(--red)}.tx-dot.credit{background:var(--green)}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-meta{font-size:11px;color:var(--muted);font-family:monospace;margin-top:2px}
.tx-amount{font-family:monospace;font-size:14px;font-weight:500;flex-shrink:0}
.tx-amount.debit{color:var(--red)}.tx-amount.credit{color:var(--green)}
.tx-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;line-height:1;border-radius:6px}
/* Var cards */
.var-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.var-name{font-size:14px;font-weight:600}
.var-sub{font-size:12px;color:var(--muted);font-family:monospace;margin-top:2px}
.var-amount{font-family:monospace;font-size:16px;font-weight:500;color:var(--amber)}
/* ZZP */
.zzp-hero{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);border:1px solid rgba(78,205,196,.2);border-radius:20px;padding:20px;margin-bottom:16px}
.zzp-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.zzp-row:last-child{border-bottom:none}
.zzp-label{font-size:13px;color:var(--muted)}
.zzp-val{font-family:monospace;font-size:13px;font-weight:500}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding-bottom:32px}
.modal-handle{width:36px;height:4px;background:var(--surface3);border-radius:99px;margin:12px auto}
.modal-hdr{padding:0 20px 16px;border-bottom:1px solid var(--border);font-size:18px;font-weight:800}
.modal-body{padding:8px 20px}
.line{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.line:last-child{border-bottom:none}
.line-name{font-size:14px;color:var(--muted)}
.line-right{display:flex;gap:10px;align-items:baseline}
/* Empty */
.empty{text-align:center;padding:40px 0;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
/* Edit button iOS style */
.edit-btn{background:none;border:none;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;padding:4px 8px;font-family:inherit;display:none}
.edit-btn.visible{display:block}
.post-name-input{background:var(--surface2);border:1px solid var(--accent);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:4px 8px;outline:none;width:130px}
input,select,textarea{font-size:16px!important;}</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-top">
      <div class="title">Budget <span>·</span> Veenstra</div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="edit-btn" id="edit-btn" onclick="toggleEdit()">Wijzig</button>
        <div style="display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px;display:none" id="month-filter">
          <button onclick="setMonth('Alles',this)" style="font-size:10px;font-weight:700;padding:4px 8px;border-radius:16px;border:none;cursor:pointer;font-family:inherit;transition:all .2s;background:var(--accent);color:#fff">Alles</button>
          <button onclick="setMonth('P1',this)" style="font-size:10px;font-weight:700;padding:4px 8px;border-radius:16px;border:none;cursor:pointer;font-family:inherit;transition:all .2s;background:transparent;color:var(--muted)">dec–jan</button>
          <button onclick="setMonth('P2',this)" style="font-size:10px;font-weight:700;padding:4px 8px;border-radius:16px;border:none;cursor:pointer;font-family:inherit;transition:all .2s;background:transparent;color:var(--muted)">jan–feb</button>
          <button onclick="setMonth('P3',this)" style="font-size:10px;font-weight:700;padding:4px 8px;border-radius:16px;border:none;cursor:pointer;font-family:inherit;transition:all .2s;background:transparent;color:var(--muted)">feb–mrt</button>
        </div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="go('dashboard',this)">Dashboard</button>
      <button class="tab" onclick="go('budget',this)">Budget</button>
      <button class="tab" onclick="go('leningen',this)">Leningen</button>
      <button class="tab" onclick="go('instellingen',this)">Instellingen</button>
    </div>
  </div>

  <div class="content">
    <div id="v-dashboard" class="view active"></div>
    <div id="v-budget" class="view"></div>
    <div id="v-leningen" class="view"></div>
    <div id="v-instellingen" class="view"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hdr" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const C = {
  bg:'#0a0a0f',surface:'#13131a',surface2:'#1c1c26',surface3:'#242432',
  border:'rgba(255,255,255,0.07)',text:'#f0f0f8',muted:'#6b6b88',
  accent:'#7c6af7',accent2:'#4ecdc4',green:'#3ddc84',red:'#ff6b6b',amber:'#ffbe0b'
};

const ICONS={
  'Woning':    {bg:'#3b5bdb',fg:'#fff',label:'W'},
  'Auto':      {bg:'#e67700',fg:'#fff',label:'A'},
  'Streaming': {bg:'#862e9c',fg:'#fff',label:'S'},
  'Leningen':  {bg:'#c92a2a',fg:'#fff',label:'L'},
  'Zorgverzekering':{bg:'#2f9e44',fg:'#fff',label:'Z'},
  'Telefoon':  {bg:'#1971c2',fg:'#fff',label:'T'},
  'Overig / ING':{bg:'#495057',fg:'#fff',label:'O'},
};
function icon(name){
  const ic=ICONS[name]||{bg:'#495057',fg:'#fff',label:name[0]};
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;background:${ic.bg};color:${ic.fg};font-size:11px;font-weight:800;flex-shrink:0;letter-spacing:0">${ic.label}</span>`;
}

let BUDGET = {
  'Woning':          { items: [
    {post:'Hypotheek',budget:1250,werkelijk:1247.22},
    {post:'Gas/Elektra',budget:250,werkelijk:250},
    {post:'Vitens',budget:20,werkelijk:20},
    {post:'Assudeuren',budget:55,werkelijk:53.71},
    {post:'TAF',budget:10,werkelijk:7.61}
  ]},
  'Auto':{ items: [
    {post:'Allianz Auto 1',budget:46,werkelijk:46.81},
    {post:'Allianz Auto 2',budget:46,werkelijk:46.28},
    {post:'Benzine',budget:350,werkelijk:242.04},
    {post:'Wegenbelasting 1',budget:31,werkelijk:31.50},
    {post:'Wegenbelasting 2',budget:31,werkelijk:31.33}
  ]},
  'Streaming':{ items: [
    {post:'HBO',budget:5,werkelijk:5.99},
    {post:'Prime',budget:5,werkelijk:4.99},
    {post:'Videoland',budget:6,werkelijk:6.32},
    {post:'Podimo',budget:10,werkelijk:6.99},
    {post:'Sky',budget:5,werkelijk:0}
  ]},
  'Leningen':{ items: [
    {post:'Anko/Emmy',budget:150,werkelijk:150},
    {post:'Auto leningen',budget:500,werkelijk:500}
  ]},
  'Zorgverzekering':{ items: [
    {post:'KT',budget:125,werkelijk:125.40},
    {post:'Ryanne',budget:125,werkelijk:125.40}
  ]},
  'Telefoon':{ items: [
    {post:'KT (Youfone)',budget:7.5,werkelijk:7.47},
    {post:'Ryanne (Ben)',budget:35,werkelijk:35.50}
  ]},
  'Overig / ING':{ items: [
    {post:'ING kosten',budget:11,werkelijk:20.62},
    {post:'Boodschappen',budget:500,werkelijk:703.45},
    {post:'Gemeente',budget:120,werkelijk:39.49},
    {post:'Xbox',budget:15,werkelijk:0},
    {post:'Was spul',budget:50,werkelijk:0}
  ]}
};

function makeBudgetItem(item){
  return { post: String(item?.post || 'Nieuwe post').trim() || 'Nieuwe post', budget: Number(item?.budget) || 0 };
}
function normalizeBudgetObject(raw){
  const out = {};
  if(!raw || typeof raw !== 'object') return out;
  Object.entries(raw).forEach(([cat,val])=>{
    const name = String(cat || '').trim();
    if(!name) return;
    const items = Array.isArray(val?.items) ? val.items : (Array.isArray(val) ? val : []);
    out[name] = { items: items.map(makeBudgetItem) };
  });
  return out;
}
function ensureBudgetDefaults(){ BUDGET = normalizeBudgetObject(BUDGET); }
ensureBudgetDefaults();

const VARIABEL=[

  {cat:'Klarna / Riverty',post:'Afbetalingen',w:326},
  {cat:'Boodschappen',post:'Supermarkt (beide rek.)',w:724.89},
  {cat:'Verzorging / Huishouden',post:'Drogist / Was',w:79.28},
  {cat:'Uit eten',post:'Restaurants / Bezorging',w:158.56},
  {cat:'Benzine',post:'Brandstof (beide rek.)',w:242.04},
  {cat:'Online / Winkels',post:'Bol/Amazon/Klussen',w:309.26},
  {cat:'PayPal / Overig',post:'PayPal (beide rek.)',w:123.32}
];

const ZZP=[
  {post:'Privé betalingen',gem:214.90},{post:'Auto - Benzine',gem:142.71},
  {post:'Winkels / Klussen',gem:138.44},{post:'PayPal / Online',gem:86.82},
  {post:'Boodschappen',gem:64.72},{post:'Uit eten',gem:55.09},
  {post:'Leningen - Klarna',gem:44.67},{post:'Belasting',gem:31.33},
  {post:'Administratie',gem:25},{post:'Drogist',gem:20.40},
  {post:'Gaming',gem:8.33},{post:'Verzekering Lifetri',gem:8.07},{post:'Overig',gem:27.81}
];

// ── LOCALSTORAGE PERSISTENCE ──
let kt=2950,ryanne=1581.89;
let transactions=[];

// Leningen — gesynchroniseerd via Sheets, lokaal gecached
localStorage.removeItem('bv_leningen'); // reset eenmalig naar correcte waarden
let LENINGEN = JSON.parse(localStorage.getItem('bv_leningen') || 'null') || [
  { id:'l1', naam:'Auto 1', totaal:2700, betaald:750, kleur:'#7c6af7' },
  { id:'l2', naam:'Auto 2', totaal:7500, betaald:0,   kleur:'#4ecdc4' },
];
function saveLeningen(){
  try{ localStorage.setItem('bv_leningen', JSON.stringify(LENINGEN)); }catch(e){}
  // Gebruik aparte saveLeningen actie — overschrijft alleen Leningen tabblad
  if(typeof sheetsUrl !== 'undefined' && sheetsUrl){
    const payload = JSON.stringify({ action:'saveLeningen', leningen: LENINGEN });
    fetch(sheetsUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:payload })
      .catch(e=>console.error('leningen sync fout:',e));
  }
}
window.varActiveCat='Boodschappen';

const fmt=n=>'€ '+Math.abs(n).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const fmtS=n=>'€'+Math.round(Math.abs(n)).toLocaleString('nl');
const totalB=()=>Object.values(BUDGET).reduce((s,c)=>s+c.items.reduce((ss,i)=>ss+i.budget,0),0);
const inc=()=>kt+ryanne;
const over=()=>inc()-totalB();
const sq=()=>over()/inc()*100;

// Periodes lopen van de 25e t/m de 24e van de volgende maand
const PERIODS = {
  'P1': { start:'2025-12-25', end:'2026-01-24', label:'25 dec – 24 jan' },
  'P2': { start:'2026-01-25', end:'2026-02-24', label:'25 jan – 24 feb' },
  'P3': { start:'2026-02-25', end:'2026-03-24', label:'25 feb – 24 mrt' },
};

let activeMonth='Alles';

function setMonth(m, btn){
  activeMonth=m;
  document.querySelectorAll('#month-filter button').forEach(b=>{
    const active = b.textContent.trim()===m;
    b.style.background = active ? 'var(--accent)' : 'transparent';
    b.style.color      = active ? '#fff' : 'var(--muted)';
    b.style.fontWeight = active ? '800' : '700';
  });
  const activeView=document.querySelector('.view.active');
  if(activeView){
    const id=activeView.id.replace('v-','');
    if(renders[id]) renders[id]();
  }
}

function monthFilter(txs){
  if(activeMonth==='Alles') return txs;
  const p=PERIODS[activeMonth];
  if(!p) return txs;
  return txs.filter(t=>t.date>=p.start && t.date<=p.end);
}

function periodLabel(){
  if(activeMonth==='Alles') return 'Alle periodes — beide rekeningen';
  const p=PERIODS[activeMonth];
  return p ? p.label+' — beide rekeningen' : activeMonth;
}

function numPeriods(){
  if(activeMonth==='Alles') return 3;
  return 1;
}

let editMode=false;

function toggleEdit(){
  editMode=!editMode;
  document.getElementById('edit-btn').textContent=editMode?'Klaar':'Wijzig';
  document.getElementById('edit-btn').style.color=editMode?'var(--green)':'var(--accent)';
  renders.budget();
}

function go(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('v-'+name).classList.add('active');
  btn.classList.add('active');
  const eb=document.getElementById('edit-btn');
  const mf=document.getElementById('month-filter');
  if(name==='budget'){eb.classList.add('visible');mf.style.display='none';}
  else{eb.classList.remove('visible');mf.style.display='none';editMode=false;eb.textContent='Wijzig';eb.style.color='var(--accent)';}
  if(name==='instellingen') renderInstellingen();
  else if(name==='leningen') renderLeningen();
  else if(renders[name]) renders[name]();
  // Haal op de achtergrond verse data op bij tabwisseling
  if(sheetsUrl){
    sheetsGet().then(result=>{
      if(result?.budget && result.budget.length > 0){
        applySheets(result);
      }
    }).catch(()=>{});
  }
}

function recatTx(fromCat,idx,toCat){
  if(!toCat)return;
  const tx=VAR_TX[fromCat][idx];
  VAR_TX[fromCat].splice(idx,1);
  if(toCat!=='__remove') VAR_TX[toCat].unshift(tx);
  window.varOpenCat=toCat!=='__remove'?toCat:fromCat;
  renders.variabel();
}

function recalcBudget(){

    bo.textContent=fmt(over());

function renamePost(cat,idx,val){
  if(!BUDGET[cat] || !BUDGET[cat].items[idx]) return;
  const clean = String(val||'').trim();
  if(clean) BUDGET[cat].items[idx].post = clean;
  saveState();
  renders.dashboard();
  if(document.getElementById('v-budget')?.classList.contains('active')) renders.budget();
}
function renameCategory(oldName,newName){
  const clean = String(newName||'').trim();
  if(!clean || clean===oldName || !BUDGET[oldName]){ renders.budget(); return; }
  if(BUDGET[clean]){ showToast('Categorie bestaat al'); renders.budget(); return; }
  const entries = Object.entries(BUDGET).map(([k,v])=> k===oldName ? [clean,v] : [k,v]);
  BUDGET = Object.fromEntries(entries);
  if(window.budgetOpen[oldName]){ window.budgetOpen[clean]=true; delete window.budgetOpen[oldName]; }
  saveState();
  rerenderAll();
}
function addCategory(){
  const clean = String(prompt('Nieuwe categorie naam?')||'').trim();
  if(!clean) return;
  if(BUDGET[clean]){ showToast('Categorie bestaat al'); return; }
  BUDGET[clean] = { items: [] };
  window.budgetOpen[clean] = true;
  saveState();
  rerenderAll();
}
function deleteCategory(name){
  if(!BUDGET[name]) return;
  if(!confirm(`Categorie "${name}" verwijderen?`)) return;
  delete BUDGET[name];
  delete window.budgetOpen[name];
  saveState();
  rerenderAll();
}

// ── LENINGEN ────────────────────────────────────────────
function renderLeningen(){
  const totaalBetaald = LENINGEN.reduce((s,l)=>s+l.betaald,0);
  const totaalSchuld  = LENINGEN.reduce((s,l)=>s+l.totaal,0);
  const totaalOpen    = totaalSchuld - totaalBetaald;
  const maandBudget   = 500; // totaal p/mnd voor alle auto leningen

  // Bereken verwachte maanden resterend op basis van openstaand
  function maandenResterend(open, pmnd){
    if(pmnd <= 0 || open <= 0) return null;
    return Math.ceil(open / pmnd);
  }

  function einddatum(maanden){
    if(!maanden) return '—';
    const d = new Date();
    d.setMonth(d.getMonth() + maanden);
    return d.toLocaleDateString('nl-NL', { month:'long', year:'numeric' });
  }

  document.getElementById('v-leningen').innerHTML = `
    <!-- Totaal overzicht -->
    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(124,106,247,.25);border-radius:20px;padding:20px;margin-bottom:16px">
      <div style="font-size:11px;color:var(--muted);letter-spacing:1px;font-family:monospace;margin-bottom:6px">TOTALE SCHULD</div>
      <div style="font-size:36px;font-weight:800;letter-spacing:-1px;color:var(--red)">€ ${totaalOpen.toLocaleString('nl')}</div>
      <div style="display:flex;gap:20px;margin-top:14px">
        <div><div style="font-size:10px;color:var(--muted);font-family:monospace;margin-bottom:2px">TOTAAL</div><div style="font-size:14px;font-weight:600">€ ${totaalSchuld.toLocaleString('nl')}</div></div>
        <div><div style="font-size:10px;color:var(--muted);font-family:monospace;margin-bottom:2px">BETAALD</div><div style="font-size:14px;font-weight:600;color:var(--green)">€ ${totaalBetaald.toLocaleString('nl')}</div></div>
        <div><div style="font-size:10px;color:var(--muted);font-family:monospace;margin-bottom:2px">P/MND</div><div style="font-size:14px;font-weight:600;color:var(--accent)">€ ${maandBudget}</div></div>
      </div>
      <!-- Totale voortgangsbalk -->
      <div style="margin-top:14px">
        <div style="background:rgba(255,255,255,.1);border-radius:99px;height:8px;overflow:hidden">
          <div style="height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:${Math.min(100,(totaalBetaald/totaalSchuld)*100).toFixed(1)}%;transition:width .6s ease"></div>
        </div>
        <div style="font-size:10px;color:var(--muted);font-family:monospace;margin-top:4px;text-align:right">${((totaalBetaald/totaalSchuld)*100).toFixed(1)}% afgelost</div>
      </div>
    </div>

    <!-- Extra aflossing -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Extra aflossing</div>
      <div style="display:flex;gap:10px;align-items:center">
        <div style="flex:1">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Verdeel over leningen</div>
          <div style="display:flex;gap:8px">
            ${LENINGEN.map(l=>`
              <div style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 10px">
                <div style="font-size:10px;color:var(--muted);margin-bottom:4px">${l.naam}</div>
                <div style="display:flex;align-items:center;gap:4px">
                  <span style="color:var(--muted);font-size:11px;font-family:monospace">€</span>
                  <input type="number" placeholder="0" min="0"
                    style="background:transparent;border:none;color:var(--text);font-family:monospace;font-size:14px;font-weight:600;width:100%;outline:none"
                    id="extra-${l.id}">
                </div>
              </div>`).join('')}
          </div>
        </div>
        <button onclick="verwerkExtraAflossing()"
          style="background:var(--green);border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;padding:12px 16px;cursor:pointer;white-space:nowrap;align-self:flex-end">
          Verwerk
        </button>
      </div>
    </div>

    <!-- Per lening -->
    ${LENINGEN.map(l=>{
      const open  = l.totaal - l.betaald;
      const pct   = Math.min(100,(l.betaald/l.totaal)*100);
      // Naar rato van openstaand saldo bepalen hoeveel van 500 naar deze lening gaat
      const ratio = totaalOpen > 0 ? open/totaalOpen : 1/LENINGEN.length;
      const pmnd  = Math.round(maandBudget * ratio);
      const maanden = maandenResterend(open, pmnd);
      return `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div>
              <div style="font-size:15px;font-weight:700">${l.naam}</div>
              <div style="font-size:11px;color:var(--muted);font-family:monospace;margin-top:2px">€ ${l.betaald.toLocaleString('nl')} betaald van € ${l.totaal.toLocaleString('nl')}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:18px;font-weight:800;color:var(--red)">€ ${open.toLocaleString('nl')}</div>
              <div style="font-size:10px;color:var(--muted);font-family:monospace">nog open</div>
            </div>
          </div>
          <!-- Voortgangsbalk -->
          <div style="background:var(--surface3);border-radius:99px;height:10px;overflow:hidden;margin-bottom:8px">
            <div style="height:100%;border-radius:99px;background:${l.kleur};width:${pct.toFixed(1)}%;transition:width .6s ease"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:monospace">
            <span>${pct.toFixed(1)}% afgelost · ~€ ${pmnd}/mnd</span>
            <span>${maanden ? `nog ~${maanden} mnd · ${einddatum(maanden)}` : 'afgelost!'}</span>
          </div>
        </div>`;
    }).join('')}`;
}

function verwerkExtraAflossing(){
  let totaalExtra = 0;
  LENINGEN.forEach(l=>{
    const el = document.getElementById('extra-'+l.id);
    const extra = parseFloat(el?.value)||0;
    if(extra > 0){
      l.betaald = Math.min(l.totaal, l.betaald + extra);
      totaalExtra += extra;
    }
    if(el) el.value = '';
  });
  if(totaalExtra > 0){
    saveLeningen();
    renderLeningen();
    showToast('€ '+totaalExtra+' extra afgelost ✓');
  } else {
    showToast('Vul een bedrag in');
  }
}

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxa-f-tmhNbPXRDgMc9VSU7nAxKtoV8hCd2twIim1Ikq58uExIrXWgnyEF0DwbMJPpmVA/exec';
let sheetsUrl = SHEETS_URL;

async function safeJson(res){
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e){ return { error: 'Parse fout: '+text.slice(0,200) }; }
}

async function sheetsPost(data){
  if(!sheetsUrl) return null;
  try {
    // Alles via GET — meest betrouwbaar met Apps Script CORS
    const url = sheetsUrl + '?payload=' + encodeURIComponent(JSON.stringify(data));
    const res = await fetch(url, { redirect:'follow' });
    return await safeJson(res);
  } catch(e){
    console.error('sheetsPost:', e);
    return { error: e.message };
  }
}

async function sheetsGet(){
  if(!sheetsUrl) return null;
  try {
    // Probeer eerst zonder redirect:follow (werkt beter op sommige mobiele browsers)
    const res = await fetch(sheetsUrl+'?action=getAll');
    const text = await res.text();
    console.log('Sheets raw text:', text.slice(0,300));
    try { return JSON.parse(text); }
    catch(e){ return { error: 'Parse fout: '+text.slice(0,100) }; }
  } catch(e){
    console.error('sheetsGet fout:', e.message);
    return { error: e.message };
  }
}

// Converteer app state naar Sheets formaat
function budgetToRows(){
  const rows = [];
  Object.entries(BUDGET).forEach(([cat, data]) => {
    const items = Array.isArray(data?.items) ? data.items : [];
    if(!items.length){
      rows.push({ categorie: cat, post: '__EMPTY__', budget: '' });
      return;
    }
    items.forEach(item => rows.push({ categorie: cat, post: item.post, budget: Number(item.budget)||0 }));
  });
  return rows;
}
function inkomstenToRows(){
  return [ { naam: 'KT', bedrag: kt }, { naam: 'Ryanne', bedrag: ryanne } ];
}

function applySheets(data){
  if(Array.isArray(data?.inkomsten)){
    data.inkomsten.forEach(r => {
      const naam = String(r.naam||'').trim();
      const bedrag = parseFloat(r.bedrag);
      if(naam === 'KT' && !isNaN(bedrag)) kt = bedrag;
      if(naam === 'Ryanne' && !isNaN(bedrag)) ryanne = bedrag;
    });
  }
  if(Array.isArray(data?.budget)){
    const rebuilt = {};
    data.budget.forEach(r => {
      const cat = String(r.categorie||'').trim();
      const post = String(r.post||'').trim();
      const budget = parseFloat(r.budget)||0;
      if(!cat) return;
      if(!rebuilt[cat]) rebuilt[cat] = { items: [] };
      if(post === '__EMPTY__' || post === '__LEEG__') return;
      rebuilt[cat].items.push({ post: post || 'Nieuwe post', budget });
    });
    if(Object.keys(rebuilt).length) BUDGET = rebuilt;
  }
  if(Array.isArray(data?.leningen)){
    LENINGEN = data.leningen.map(r=>({
      id: String(r.id || Date.now()),
      naam: String(r.naam || 'Lening'),
      totaal: parseFloat(r.totaal)||0,
      betaald: parseFloat(r.betaald)||0,
      kleur: String(r.kleur||'#7c6af7')
    }));
    try{ localStorage.setItem('bv_leningen', JSON.stringify(LENINGEN)); }catch(e){}
  }
  saveState(false);
  rerenderAll();
}

async function saveToSheets(){
  const btn = document.querySelector('[onclick="saveToSheets()"]');
  const status = document.getElementById('save-status');
  if(btn){ btn.textContent='⏳ Opslaan...'; btn.disabled=true; }
  const result = await sheetsPost({
    action: 'saveAll',
    inkomsten: inkomstenToRows(),
    budget: budgetToRows(),
    leningen: LENINGEN
  });
  if(btn){ btn.textContent='☁️ Opslaan in Sheets'; btn.disabled=false; }
  if(result?.ok){
    if(status) status.textContent = 'Opgeslagen op '+new Date().toLocaleTimeString('nl')+' ✓';
    showToast('Opgeslagen ✓');
  } else {
    if(status) status.textContent = 'Opslaan mislukt';
    showToast('Opslaan mislukt');
  }
}

async function loadFromSheets(showMessage=true){
  if(!sheetsUrl){ if(showMessage) showToast('Geen Script URL ingesteld'); return false; }
  if(showMessage) showToast('Ophalen uit Sheets...');
  const result = await sheetsGet();
  if(result?.error){ if(showMessage) showToast('Fout: '+result.error.slice(0,60)); return false; }
  applySheets(result || {});
  if(showMessage) showToast('Data opgehaald uit Sheets ✓');
  return true;
}

function saveState(push=true){
  try{
    localStorage.setItem('bv_kt', kt);
    localStorage.setItem('bv_ryanne', ryanne);

function loadState(){

    const sr=localStorage.getItem('bv_ryanne');
    const sb=localStorage.getItem('bv_budget');
    const sl=localStorage.getItem('bv_leningen');

      const saved=JSON.parse(sb);
      const normalized = normalizeBudgetObject(saved);

      const savedLeningen=JSON.parse(sl);
